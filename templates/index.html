<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 40px 20px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-muted);
            margin: 0;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        textarea::placeholder {
            color: #64748b;
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .summary-output {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.4);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.5s forwards;
            display: none;
        }

        .summary-output.visible {
            display: block;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-output::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
        }

        #summary-heading {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: 600;
        }

        #summary-text {
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        button.processing .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Ambient light effects */
        .ambient-light {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-primary);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.1; }
            50% { transform: scale(1.2) translate(50px, 50px); opacity: 0.2; }
            100% { transform: scale(0.9) translate(-50px, -20px); opacity: 0.1; }
        }
    </style>
</head>
<body>
    <div class="ambient-light" style="top: 10%; left: 10%;"></div>
    <div class="ambient-light" style="bottom: 10%; right: 10%; background: var(--accent-secondary);"></div>
    
    <div class="container">
        <div class="header">
            <h1>Text Summarizer</h1>
            <h3>using HuggingFace Transformer</h3>
        </div>
        <p class="subtitle">Write or paste your Dialogue</p>

        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your content here" required></textarea>
            <button type="submit" id="submit-btn">
                <span class="btn-text">Summarize</span>
                <div class="loading-spinner"></div>
            </button>
        </form>

        <div class="summary-output" id="summary-container">
            <h3 id="summary-heading">Content Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById("summarization-form");
        const container = document.getElementById("summary-container");
        
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            // Get references to elements 
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
            const btnText = submitButton.querySelector(".btn-text");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
            
            // Show container
            container.classList.add("visible");
            
            // Show processing message and disable button
            summaryText.innerText = "Processing...";
            submitButton.disabled = true;
            submitButton.classList.add("processing");
            if (btnText) btnText.innerText = "Processing...";
        
            try {
                // send dialogue to the backend
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } catch (err) {
                summaryText.innerText = `Error: ${err.message}`;
            } finally {
                submitButton.disabled = false;
                submitButton.classList.remove("processing");
                if (btnText) btnText.innerText = "Summarize";
            }
        });
    </script>
</body>
</html>
